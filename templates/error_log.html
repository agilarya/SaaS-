<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Log - God Mode</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #0c0c0c;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        .header-bar {
            border-bottom: 2px dashed #0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-back {
            color: #0f0;
            text-decoration: none;
            border: 1px solid #0f0;
            padding: 5px 15px;
            background: transparent;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-back:hover {
            background: #0f0;
            color: #000;
        }
        .log-container {
            background: #000;
            padding: 15px;
            border: 1px solid #333;
            height: 75vh;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        /* Custom Scrollbar Terminal */
        .log-container::-webkit-scrollbar { width: 8px; }
        .log-container::-webkit-scrollbar-track { background: #111; }
        .log-container::-webkit-scrollbar-thumb { background: #0f0; }
        
        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background: #0f0;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header-bar">
        <div>
            <h2 style="margin: 0;"><i class="bi bi-terminal-fill"></i> PYTHONANYWHERE_SYS_LOG</h2>
            <small>Establishing secure connection to /var/log/error.log ... [OK]</small>
        </div>
        <a href="/settings" class="btn-back"><i class="bi bi-escape"></i> EXIT</a>
    </div>

    <div class="log-container" id="terminalBox">
root@skripsikuu:~# tail -n 100 error.log
--------------------------------------------------
{{ log_content }}
--------------------------------------------------
root@skripsikuu:~# <span class="cursor"></span>
    </div>

    <script>
        // Auto-scroll ke bawah (karena log terbaru ada di bawah)
        const term = document.getElementById('terminalBox');
        term.scrollTop = term.scrollHeight;
    </script>
</body>
</html>
