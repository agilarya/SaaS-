<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Skripsikuu Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/client_style.css') }}">
</head>
<body>

    <div class="glass-card">
        <div class="text-center mb-4">
            <div class="brand-icon" style="background: linear-gradient(135deg, #198754, #20c997);">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h3 class="fw-bolder text-dark mb-1">Buat Akun</h3>
            <p class="text-muted small">Mulai perjalanan lulus tepat waktu</p>
        </div>

        <form method="POST" action="{{ url_for('client.register_client') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary ms-1">Nama Lengkap</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;">
                        <i class="bi bi-person text-muted"></i>
                    </span>
                    <input type="text" name="nama_lengkap" class="form-control border-start-0" placeholder="Nama Anda" required style="border-radius: 0 12px 12px 0;">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary ms-1">Alamat Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0" style="border-radius: 12px 0 0 12px;">
                        <i class="bi bi-envelope text-muted"></i>
                    </span>
                    <input type="email" name="email" class="form-control border-start-0" placeholder="contoh@email.com" required style="border-radius: 0 12px 12px 0;">
                </div>
                <div class="form-text mt-2" style="font-size: 0.75rem;">
                    Gunakan email aktif. Kami akan mengirimkan akses masuk (tanpa password) ke email ini.
                </div>
            </div>

            <button type="submit" class="btn btn-magic w-100 fw-bold rounded-pill py-2 mb-3" style="background: linear-gradient(135deg, #198754 0%, #20c997 100%);">
                <i class="bi bi-check-circle me-1"></i> Daftar Sekarang
            </button>
        </form>

        <div class="text-center mt-3 border-top pt-3">
            <p class="text-muted small mb-0">
                Sudah punya akun? <a href="{{ url_for('client.login_client') }}" class="fw-bold text-primary text-decoration-none">Masuk di sini</a>
            </p>
        </div>
    </div>

</body>
</html>
