<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Skripsikuu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .error-card { max-width: 500px; width: 90%; text-align: center; background: #ffffff; padding: 4rem 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 6px solid #3b82f6; }
        .error-code { font-size: 7rem; font-weight: 900; color: #e2e8f0; line-height: 1; margin-bottom: 0; }
        .error-icon { font-size: 4rem; color: #3b82f6; position: absolute; margin-top: -20px; margin-left: -30px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
    </style>
</head>
<body>
    <div class="error-card position-relative">
        <i class="bi bi-robot error-icon"></i>
        <h1 class="error-code">404</h1>
        <h3 class="fw-bolder text-dark mt-3">Waduh, Kesasar Bos!</h3>
        <p class="text-secondary mb-4 mt-2">Halaman yang lu cari nggak ada di sistem, salah ketik, atau udah dihapus. Mending kita balik ke markas sekarang.</p>
        <a href="/dashboard" class="btn btn-primary fw-bold px-5 py-2 shadow-sm rounded-pill"><i class="bi bi-house-door-fill me-2"></i>Kembali ke Dashboard</a>
    </div>
</body>
</html>
